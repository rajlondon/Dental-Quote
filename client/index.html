<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="frame-ancestors *" />
    <meta http-equiv="X-Frame-Options" content="ALLOWALL" />
    <title>MyDentalFly - Your Trusted Dental Treatment Concierge</title>
    <meta name="description" content="Find affordable dental treatments abroad with MyDentalFly. Compare prices, read reviews, and book appointments with top-rated dental clinics worldwide.">
    <link rel="icon" href="/images/mydentalfly-logo.png" type="image/png" />
    <link rel="shortcut icon" href="/images/mydentalfly-logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/images/mydentalfly-logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/mydentalfly-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
      // Replit iframe compatibility fix
      console.log('Loading MyDentalFly application...');
      
      const isInIframe = window.self !== window.top;
      const isReplit = window.location.hostname.includes('replit') || window.location.hostname.includes('repl.it');
      
      console.log('Environment check:', { isInIframe, isReplit, hostname: window.location.hostname });
      
      // For Replit iframe, show immediate message but still load the app
      if (isInIframe && isReplit) {
        console.log('Replit iframe detected - setting up compatibility mode');
        
        // Show loading message immediately
        document.addEventListener('DOMContentLoaded', function() {
          const loadingOverlay = document.createElement('div');
          loadingOverlay.id = 'replit-loading';
          loadingOverlay.style.cssText = `
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; z-index: 9999; display: flex; align-items: center; 
            justify-content: center; font-family: 'Segoe UI', Arial, sans-serif;
          `;
          loadingOverlay.innerHTML = `
            <div style="text-align: center; max-width: 500px; padding: 40px;">
              <div style="font-size: 48px; margin-bottom: 20px;">🦷</div>
              <h1 style="margin: 0 0 10px 0; font-size: 32px;">MyDentalFly</h1>
              <p style="margin: 0 0 20px 0; font-size: 18px; opacity: 0.9;">
                Loading application...
                </p>
                <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                  <p style="margin: 0; font-size: 14px;">
                    For the best experience, open in a new tab.<br>
                    Or try preview mode below.
                  </p>
                </div>
                <button onclick="window.open(window.location.href, '_blank')" 
                        style="background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); 
                               padding: 15px 30px; border-radius: 25px; cursor: pointer; font-size: 16px; margin-right: 10px;
                               backdrop-filter: blur(10px);">
                  Open New Tab
                </button>
                <button onclick="document.getElementById('replit-loading').remove(); sessionStorage.setItem('replit-force-iframe', 'true');" 
                        style="background: transparent; color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.3); 
                               padding: 15px 30px; border-radius: 25px; cursor: pointer; font-size: 16px;">
                  Try Preview Mode
                </button>
              </div>
            `;
            document.body.appendChild(loadingOverlay);
          });
        }
      }
      
      // Enhanced iframe mode styling
      if (isInIframe) {
        document.addEventListener('DOMContentLoaded', function() {
          document.body.classList.add('iframe-mode');
          
          // Add enhanced CSS for iframe compatibility
          const style = document.createElement('style');
          style.textContent = `
            .iframe-mode {
              overflow-x: hidden !important;
              max-width: 100vw !important;
            }
            .iframe-mode * {
              box-sizing: border-box !important;
            }
            .iframe-mode #root {
              width: 100% !important;
              min-height: 100vh !important;
              overflow-x: hidden !important;
            }
          `;
          document.head.appendChild(style);
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
