<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="frame-ancestors *" />
    <meta http-equiv="X-Frame-Options" content="ALLOWALL" />
    <title>MyDentalFly - Your Trusted Dental Treatment Concierge</title>
    <meta name="description" content="Find affordable dental treatments abroad with MyDentalFly. Compare prices, read reviews, and book appointments with top-rated dental clinics worldwide.">
    <link rel="icon" href="/images/mydentalfly-logo.png" type="image/png" />
    <link rel="shortcut icon" href="/images/mydentalfly-logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/images/mydentalfly-logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/mydentalfly-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
      // Enhanced iframe detection and Replit preview handling
      const isInIframe = window.self !== window.top;
      const isReplit = window.location.hostname.includes('replit');
      
      if (isInIframe && isReplit) {
        console.log('Detected Replit iframe environment');
        
        // Immediate redirect for better compatibility
        const shouldRedirect = !sessionStorage.getItem('replit-iframe-bypass');
        
        if (shouldRedirect) {
          // Set flag to prevent redirect loop
          sessionStorage.setItem('replit-iframe-bypass', 'true');
          
          // Open in new tab and show message
          const newWindow = window.open(window.location.href, '_blank');
          
          // Show overlay message
          document.addEventListener('DOMContentLoaded', function() {
            const overlay = document.createElement('div');
            overlay.style.cssText = `
              position: fixed; top: 0; left: 0; right: 0; bottom: 0;
              background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
              color: white; z-index: 9999; display: flex; align-items: center; 
              justify-content: center; font-family: 'Segoe UI', Arial, sans-serif;
            `;
            overlay.innerHTML = `
              <div style="text-align: center; max-width: 500px; padding: 40px;">
                <div style="font-size: 48px; margin-bottom: 20px;">🦷</div>
                <h1 style="margin: 0 0 10px 0; font-size: 32px;">MyDentalFly</h1>
                <p style="margin: 0 0 30px 0; font-size: 18px; opacity: 0.9;">
                  Opening in new tab for the best experience...
                </p>
                <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                  <p style="margin: 0; font-size: 14px;">
                    Replit's preview has display limitations for complex applications.<br>
                    The new tab provides full functionality.
                  </p>
                </div>
                <button onclick="window.open('${window.location.href}', '_blank')" 
                        style="background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); 
                               padding: 15px 30px; border-radius: 25px; cursor: pointer; font-size: 16px; margin-right: 10px;
                               backdrop-filter: blur(10px);">
                  Open New Tab
                </button>
                <button onclick="this.parentElement.parentElement.remove(); sessionStorage.setItem('replit-force-iframe', 'true');" 
                        style="background: transparent; color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.3); 
                               padding: 15px 30px; border-radius: 25px; cursor: pointer; font-size: 16px;">
                  Force Preview Mode
                </button>
              </div>
            `;
            document.body.appendChild(overlay);
          });
        }
      }
      
      // Enhanced iframe mode styling
      if (isInIframe) {
        document.addEventListener('DOMContentLoaded', function() {
          document.body.classList.add('iframe-mode');
          
          // Add enhanced CSS for iframe compatibility
          const style = document.createElement('style');
          style.textContent = `
            .iframe-mode {
              overflow-x: hidden !important;
              max-width: 100vw !important;
            }
            .iframe-mode * {
              box-sizing: border-box !important;
            }
            .iframe-mode #root {
              width: 100% !important;
              min-height: 100vh !important;
              overflow-x: hidden !important;
            }
          `;
          document.head.appendChild(style);
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
