<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="frame-ancestors *" />
    <meta http-equiv="X-Frame-Options" content="ALLOWALL" />

    <link rel="icon" href="/images/mydentalfly-logo.png" type="image/png" />
    <link rel="shortcut icon" href="/images/mydentalfly-logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/images/mydentalfly-logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/mydentalfly-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
      // Iframe detection and compatibility for Replit preview
      if (window.self !== window.top) {
        console.log('Running in iframe - Replit preview mode');
        // Force enable iframe mode
        window.addEventListener('load', function() {
          document.body.classList.add('iframe-mode');
        });
      }
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
