<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="frame-ancestors *" />
    <meta http-equiv="X-Frame-Options" content="ALLOWALL" />
    <title>MyDentalFly - Your Trusted Dental Treatment Concierge</title>
    <meta name="description" content="Find affordable dental treatments abroad with MyDentalFly. Compare prices, read reviews, and book appointments with top-rated dental clinics worldwide.">
    <link rel="icon" href="/images/mydentalfly-logo.png" type="image/png" />
    <link rel="shortcut icon" href="/images/mydentalfly-logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/images/mydentalfly-logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/mydentalfly-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
      // Simple application loader
      console.log('MyDentalFly: Starting application');
      
      // Force the app to load after a short delay if needed
      document.addEventListener('DOMContentLoaded', function() {
        console.log('MyDentalFly: DOM loaded');
        
        // For iframe environments, show a simple loading message
        const isInIframe = window.self !== window.top;
        if (isInIframe) {
          setTimeout(function() {
            const root = document.getElementById('root');
            if (root && root.innerHTML.trim() === '') {
              console.log('MyDentalFly: App not loaded in iframe, showing fallback');
              root.innerHTML = `
                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; text-align: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; font-family: system-ui, -apple-system, sans-serif;">
                  <div style="background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; backdrop-filter: blur(10px); max-width: 500px;">
                    <div style="font-size: 48px; margin-bottom: 20px;">🦷</div>
                    <h1 style="margin: 0 0 15px 0; font-size: 28px;">MyDentalFly</h1>
                    <p style="margin: 0 0 25px 0; font-size: 16px; opacity: 0.9;">
                      For the complete dental treatment platform experience
                    </p>
                    <button onclick="window.open(window.location.href, '_blank')" 
                            style="background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.3); 
                                   padding: 15px 30px; border-radius: 25px; cursor: pointer; font-size: 16px; font-weight: 500;
                                   backdrop-filter: blur(10px); transition: all 0.3s ease;">
                      Open Full Application
                    </button>
                  </div>
                </div>
              `;
            }
          }, 3000);
        }
      });
      
      // Add iframe compatibility styles
      document.addEventListener('DOMContentLoaded', function() {
        const isInIframe = window.self !== window.top;
        if (isInIframe) {
          document.body.classList.add('iframe-mode');
          
          // Add enhanced CSS for iframe compatibility
          const style = document.createElement('style');
          style.textContent = `
            .iframe-mode {
              overflow-x: hidden !important;
              max-width: 100vw !important;
            }
            .iframe-mode * {
              box-sizing: border-box !important;
            }
            .iframe-mode #root {
              width: 100% !important;
              min-height: 100vh !important;
              overflow-x: hidden !important;
            }
          `;
          document.head.appendChild(style);
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
